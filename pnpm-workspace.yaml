packages:
  - packages/*
  - services/*
  - services/*/engines/*

allowBuilds:
  core-js: false
  esbuild: true
  lightningcss: true
  msw: false
  sharp: true
  unrs-resolver: true
  workerd: true

minimumReleaseAge: 1440
minimumReleaseAgeStrict: false
trustPolicy: no-downgrade
trustPolicyExclude:
  - chokidar@4.0.3
  - semver@6.3.1
  - undici-types@6.21.0

catalog:
  vite: npm:@voidzero-dev/vite-plus-core@0.2.5
  vite-plus: 0.2.5
  vitest: 4.1.10

onlyBuiltDependencies:
  - esbuild
  - sharp
  - workerd

overrides:
  vite: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"

minimumReleaseAgeExclude:
  - "@cloudflare/workers-types@5.20260721.1"
  - "@llamaindex/liteparse-darwin-arm64@2.8.0"
  - "@llamaindex/liteparse-darwin-x64@2.8.0"
  - "@llamaindex/liteparse-linux-arm64-gnu@2.8.0"
  - "@llamaindex/liteparse-linux-x64-gnu@2.8.0"
  - "@llamaindex/liteparse-linux-x64-musl@2.8.0"
  - "@llamaindex/liteparse-win32-arm64-msvc@2.8.0"
  - "@llamaindex/liteparse-win32-x64-msvc@2.8.0"
  - "@llamaindex/liteparse@2.8.0"
