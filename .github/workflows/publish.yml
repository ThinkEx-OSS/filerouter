name: Publish packages

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish npm packages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm
    env:
      VITE_GIT_HOOKS: "0"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm install --global npm@11
      - run: pnpm install --frozen-lockfile
      - name: Verify release versions
        id: versions
        shell: bash
        run: |
          sdk_version=$(node -p "require('./packages/filerouter/package.json').version")
          cli_version=$(node -p "require('./packages/cli/package.json').version")
          test "$sdk_version" = "$cli_version"
          test "$GITHUB_REF_NAME" = "v$sdk_version"
          if npm view "@file_router/sdk@$sdk_version" version >/dev/null 2>&1; then
            echo "sdk_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "sdk_exists=false" >> "$GITHUB_OUTPUT"
          fi
          if npm view "@file_router/cli@$cli_version" version >/dev/null 2>&1; then
            echo "cli_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "cli_exists=false" >> "$GITHUB_OUTPUT"
          fi
      - run: pnpm check
      - run: pnpm test
      - run: pnpm build:packages
      - name: Pack packages
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/packages"
          pnpm --filter @file_router/sdk pack --pack-destination "$RUNNER_TEMP/packages"
          pnpm --filter @file_router/cli pack --pack-destination "$RUNNER_TEMP/packages"
      - name: Verify packed packages
        shell: bash
        run: |
          test_dir=$(mktemp -d)
          cd "$test_dir"
          npm init --yes > /dev/null
          npm install "$RUNNER_TEMP"/packages/file_router-sdk-*.tgz "$RUNNER_TEMP"/packages/file_router-cli-*.tgz
          node --input-type=module --eval 'import { FileRouterClient } from "@file_router/sdk"; if (typeof FileRouterClient !== "function") process.exit(1)'
          npx --no-install filerouter --help > /dev/null
      - name: Publish SDK
        if: steps.versions.outputs.sdk_exists != 'true'
        shell: bash
        run: npm publish "$(find "$RUNNER_TEMP/packages" -name 'file_router-sdk-*.tgz' -print -quit)" --access public
      - name: Publish CLI
        if: steps.versions.outputs.cli_exists != 'true'
        shell: bash
        run: npm publish "$(find "$RUNNER_TEMP/packages" -name 'file_router-cli-*.tgz' -print -quit)" --access public
