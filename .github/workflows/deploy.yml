name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy production
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: https://filerouter.dev
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      DEPLOY_URL: https://filerouter.dev
      VITE_GIT_HOOKS: "0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || 'main' }}
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm db:migrate
      - run: pnpm exec wrangler deploy
      - name: Verify deployment
        shell: bash
        run: |
          curl --fail --silent --show-error --retry 10 --retry-all-errors --retry-delay 3 "$DEPLOY_URL/api/v1/health"
          curl --fail --silent --show-error --retry 10 --retry-all-errors --retry-delay 3 "$DEPLOY_URL/api/openapi.json" > /dev/null
